server:
  port: 8001

spring:
  application:
    name: book-microservice
  datasource:
    url: jdbc:h2:mem:testdb # ${DB_URL_USER}
    username: sa # ${DB_USERNAME_USER}
    password: # ${DB_PASSWORD_USER}
    driver-class-name: org.h2.Driver # org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      max-lifetime: 1800000
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        # dialect: org.hibernate.dialect.MariaDBDialect #deploy
        format_sql: true # local

  flyway:
    enabled: true

  h2:
    console:
      enabled: true #false

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /api-docs